name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # On tag push: electron-builder publishes installer + latest.yml +
      # blockmap directly to the GitHub Release for this tag (creates draft if
      # none exists). The latest.yml metadata is what electron-updater on
      # installed clients polls to detect new versions.
      #
      # On manual run (workflow_dispatch): build only, no publish — used for
      # smoke-testing CI without cutting a release.
      - name: build (and publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --win --publish always
          else
            npx electron-builder --win --publish never
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # macOS build is unsigned — we don't have an Apple Developer ID
      # ($99/yr) so Gatekeeper rejects the .app as "damaged and can't
      # be opened" with no right-click→Open bypass.
      #
      # Workaround for users: run `xattr -cr ~/Downloads/<dmg>` before
      # opening, OR `xattr -cr "/Applications/Resolution Scouting.app"`
      # after install. Documented in release notes.
      #
      # Pre-build ad-hoc codesign attempt: `afterPack` hook (configured
      # via package.json build.afterPack) signs the .app before
      # electron-builder packs it into the dmg. This avoids needing to
      # mount/re-flatten/re-upload after the fact.
      - name: build (and publish on tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            npx electron-builder --mac --arm64 --publish always
          else
            npx electron-builder --mac --arm64 --publish never
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml
          retention-days: 30
